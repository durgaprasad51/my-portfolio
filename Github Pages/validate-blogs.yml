name: Validate Blog Posts

on:
  push:
    branches: [main]
    paths:
      - 'blogs/**.md'
  pull_request:
    branches: [main]
    paths:
      - 'blogs/**.md'

jobs:
  validate:
    name: Validate Markdown Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate blog posts
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Validating blog posts in blogs/"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          FAILED=0
          COUNT=0

          for f in blogs/*.md; do
            # Skip template files
            [[ "$f" == *"_TEMPLATE"* ]] && continue
            COUNT=$((COUNT+1))

            # Check for # Title
            TITLE=$(grep -m1 "^# " "$f" || true)
            if [ -z "$TITLE" ]; then
              echo "❌ MISSING TITLE  →  $f"
              echo "   Fix: Add '# Your Title' as the very first line"
              FAILED=1
            else
              echo "✅ $f"
              echo "   $TITLE"
            fi

            # Check for category (warn only)
            CAT=$(grep -m1 "<!-- category:" "$f" || true)
            if [ -z "$CAT" ]; then
              echo "   ⚠️  No category found — will default to 'DevOps'"
              echo "   Tip: Add <!-- category: Kubernetes --> after the title"
            else
              echo "   $CAT"
            fi
            echo ""
          done

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  $COUNT blog post(s) found"
          [ $FAILED -eq 0 ] && echo "  ✅ All posts valid — live on portfolio!" || echo "  ❌ Fix the errors above"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit $FAILED
